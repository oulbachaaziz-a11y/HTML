<!DOCTYPE html>
<!-- The lang Attribute -->
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Attributes</title>
</head>
<body>
    <a href="https://www.w3schools.com">Visit W3Schools</a>
    <img src="image.jpg" alt="Girl with a jacket" width="200" height="200">
<h2>The style Attribute</h2>
<p style="color: red;">This is a red paragraph.</p>
<p title="I'm a tooltip">This is a paragraph.</p>
<a href="https://www.w3schools.com/html/">Visit our HTML tutorial</a>
<p title=Description of W3Schools>This is a paragraph.</p>
<p><b>If you move the mouse over the paragraph above,
your browser will only display the first word from the title.</b></p>
</body>
</html>
