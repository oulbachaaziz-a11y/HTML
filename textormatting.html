<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HTML Text Formatting</h1>
    <hr>
    <p>HTML contains serveral elements for defining text with a special meaining </p>
    <br>
    <b>Bold text</b><br>
    <strong>Important text</strong><br>
    <i>Italic text</i> <br>
    <em>Emphasized text</em> <br>
    <mark>Marked text</mark> <br>
    <small>Smaller text</small> <br>
    <del>Deleted text</del> <br>
    <ins>Insert text</ins> <br>
    <p>This is <sub>Subscript text</sub></p> <br>
    <p>This is <sup>Superscript text</sup></p> <br>
</body>
